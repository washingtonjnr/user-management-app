<main class="auth-container">
  <div class="auth-card">
    <h1>Sign In</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          aria-describedby="email-error"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span id="email-error" class="error" role="alert">Valid email is required.</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          aria-describedby="password-error"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span id="password-error" class="error" role="alert">Password is required.</span>
        }
      </div>

      @if (error()) {
        <p class="error global-error" role="alert">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="redirect">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>
  </div>
</main>
